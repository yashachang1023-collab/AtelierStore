# JPA ??
# --- Database & JPA Settings ---
# Automatically update the database schema based on Java Entity changes
spring.jpa.hibernate.ddl-auto=update

# Show generated SQL in the console for debugging
spring.jpa.show-sql=true
# Format the SQL for better readability in the console
spring.jpa.properties.hibernate.format_sql=true

# --- Security & JWT Settings ---
# Secret key for JWT signing (Should be long and secure)
jwt.secret=myAtelierStoreProjectSuperSecretKeyForJWTGeneration
# JWT expiration time in milliseconds (Default: 24 hours)
jwt.expiration=86400000

# CORS Settings - Can be different for Dev and Prod
app.cors.allowed-origins= http://localhost:3000

# --- File Upload Settings ---
# Maximum allowed size for a single uploaded file
spring.servlet.multipart.max-file-size=5MB
# Maximum total request size (files + form data)
spring.servlet.multipart.max-request-size=5MB

# --- Storage Paths ---
# Physical directory on the disk to store uploaded illustrations
file.upload-dir=uploads/illustrations


